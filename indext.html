<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Bookings tracker</title>
  
</head>

<body>

    <h2>Google Calendar Tracker Dashboard</h2>
    <p>Paste an appointment link below to monitor</p>

    <div class="add-link-section">
        <input type="text" id="newLinkInput" placeholder="Paste a new Google Calendar appointment link here...">
        <button class="add-btn" onclick="addNewLink()">➕ Add Link</button>
    </div>

    <div class="dashboard-card">
        <h3>📋 Your Saved Calendars</h3>
        <div id="linksListContainer"></div>
    </div>

    <button class="check-btn" id="checkBtn" onclick="checkAllAvailability()">🔄 Check Saved Bookings Now</button>

    <div id="results"></div>


    
</body>

</html>
